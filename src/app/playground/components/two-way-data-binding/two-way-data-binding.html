<div
  class="min-h-screen bg-pastel-green p-4 md:p-8 flex flex-col items-center justify-center gap-3"
>
  <h1 class="text-2xl md:text-3xl font-bold text-stone-800">Two-Way Data Binding</h1>

  <!-- Input #1 -->
  <div class="flex flex-col gap-1.5">
    <label class="ml-1 text-sm font-bold text-stone-500 flex items-center gap-2">
      <span class="w-1.5 h-1.5 rounded-full bg-sage"></span>
      Nome do Pet
    </label>
    <input type="text" name="petName" class="form-input" placeholder="Como ele se chama?" />
  </div>

  <!-- Input #2 -->
  <div class="flex flex-col gap-1.5">
    <label class="ml-1 text-sm font-bold text-stone-500 flex items-center gap-2">
      <span class="w-1.5 h-1.5 rounded-full bg-sage"></span>
      Raça do Pet
    </label>
    <input type="text" name="petRace" class="form-input" placeholder="Qual é a raça dele?" />
  </div>

  <button type="submit" class="btn-primary cursor-pointer">Atualizar</button>
</div>
